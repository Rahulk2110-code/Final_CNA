# ═══════════════════════════════════════════════════════════════
#  RVCE Todo App — Docker Compose Configuration
# ═══════════════════════════════════════════════════════════════
#
#  Usage:
#    docker compose up -d        # Start Application
#    docker compose down         # Stop Application
#
# ═══════════════════════════════════════════════════════════════

services:

  # ── Todo Application ──────────────────────────────────────
  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rvce-todo-app
    ports:
      - "3000:3000"
    env_file:
      - .env.example
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - todo-network


networks:
  todo-network:
    driver: bridge